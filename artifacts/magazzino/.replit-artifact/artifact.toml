kind = "web"
previewPath = "/"
title = "Il magazzino del man"
version = "1.0.0"
id = "artifacts/magazzino"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22393

[services.development]
run = "pnpm --filter @workspace/magazzino run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magazzino", "run", "build" ]
serve = "static"
publicDir = "artifacts/magazzino/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22393"
BASE_PATH = "/"
